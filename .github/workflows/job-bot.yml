name: Job Bot - Auto Apply

on:
  schedule:
    # Run every 12 hours (at 00:00 and 12:00 UTC)
    # That's 7 AM and 7 PM Indonesia time (UTC+7)
    - cron: '0 */12 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome and ChromeDriver
        run: |
          # Install Chrome
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

          # Verify Chrome installation
          google-chrome --version
          which google-chrome

          # Install ChromeDriver (matching Chrome version)
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+')
          echo "Chrome version: $CHROME_VERSION"

          # ChromeDriver will be auto-managed by webdriver-manager in Python
          echo "ChromeDriver will be managed by webdriver-manager package"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

          # Verify critical packages
          python -c "import selenium; print(f'Selenium: {selenium.__version__}')"
          python -c "import bs4; print('BeautifulSoup4: OK')"
          python -c "import groq; print('Groq: OK')"

      - name: Run Job Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APPLICANT_NAME: ${{ secrets.APPLICANT_NAME }}
          APPLICANT_EMAIL: ${{ secrets.APPLICANT_EMAIL }}
        run: |
          echo "Starting Job Bot..."
          python -u main.py
          echo "Job Bot completed!"

      - name: Upload logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_number }}
          path: |
            *.log
            data/jobs.db
          retention-days: 7

# Exact replica of old WORKING workflow for diagnostic purposes
name: Job Notification Bot (Test)

on:
  workflow_dispatch:  # Manual trigger only for testing

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore CV from secret
        run: |
          echo "${{ secrets.CV_BASE64 }}" | base64 -d > cv.pdf
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore jobs database
        uses: actions/cache@v4
        with:
          path: data/jobs.db
          key: jobs-db-${{ github.run_id }}
          restore-keys: jobs-db-

      - name: Run Job Bot
        env:
          APPLICANT_NAME:    ${{ secrets.APPLICANT_NAME }}
          APPLICANT_EMAIL:   ${{ secrets.APPLICANT_EMAIL }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          CV_PATH:           cv.pdf
        run: python main.py

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jobs-db-test-${{ github.run_number }}
          path: data/jobs.db
          retention-days: 7

# .github/workflows/job_bot.yml
name: Job Application Bot

on:
  schedule:
    # Jalan 3x sehari: jam 08:00, 13:00, 18:00 WIB (UTC+7 = -7 jam)
    - cron: "0 1 * * *"   # 08:00 WIB
    - cron: "0 6 * * *"   # 13:00 WIB
    - cron: "0 11 * * *"  # 18:00 WIB
  workflow_dispatch:       # Bisa run manual dari GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Cache CV dari secret (upload cv.pdf sebagai GitHub Secret base64)
      - name: Restore CV from secret
        run: |
          echo "${{ secrets.CV_BASE64 }}" | base64 -d > cv.pdf
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Persist database antar run menggunakan GitHub Actions cache
      - name: Restore jobs database
        uses: actions/cache@v4
        with:
          path: data/jobs.db
          key: jobs-db-${{ github.run_id }}
          restore-keys: jobs-db-

      - name: Run Job Bot
        env:
          APPLICANT_NAME:    ${{ secrets.APPLICANT_NAME }}
          APPLICANT_EMAIL:   ${{ secrets.APPLICANT_EMAIL }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:    ${{ secrets.GMAIL_APP_PASS }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CV_PATH:           cv.pdf
        run: python main.py

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jobs-db-${{ github.run_number }}
          path: data/jobs.db
          retention-days: 30
